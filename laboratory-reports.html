<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laboratory Reports</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#1f3c88">
</head>
<body>
<div class="container">

<div class="nav">
  <a href="form.html">Clinical Form</a>
  <a href="index.html">Patient Selector</a>
  <a href="vital-signs.html">Vital Signs</a>
  <a href="laboratory-reports.html">Laboratory Reports</a>
  <a href="ivf-sheet.html">IVF Sheet</a>
  <a href="intake-output.html">Intake/Output</a>
  <a href="nurses-notes.html">Nurse's Notes</a>
  <a href="medication-sheet.html">Medication Sheet</a>
  <a href="downward-referral.html">Downward Referral</a>
  <a href="records.html">Records</a>
</div>

<div class="header">
  <img src="logo.png" class="logo" alt="Hospital Logo">
  <div>
    <h1>Doctors Community Hospital</h1>
    <p>P-1 Poblacion, Mawab, Davao de Oro</p>
    <h2>Laboratory Reports</h2>
  </div>
</div>


<div class="section">
  <h3>Patient Information</h3>
  <div class="grid">
    <div><label>Patient's Name</label><input type="text" id="patientName"></div>
    <div><label>Age/Sex</label><input type="text" id="ageSex"></div>
    <div><label>Room & Bed No.</label><input type="text" id="roomBedNo"></div>
    <div><label>Attending Physician</label><input type="text" id="attendingPhysician"></div>
    <div><label>Case No.</label><input type="text" id="caseNo"></div>
  </div>
</div>

<div class="section">
  <h3>Laboratory Reports / Results</h3>
  <textarea id="laboratoryReports" placeholder="Encode laboratory reports/results here..."></textarea>
</div>

<div class="actions">
  <button class="btn-save" id="savePage">Save Laboratory Report</button>
  <button class="btn-print" onclick="printPage()">Print</button>
</div>

</div>
<script src="app.js"></script>

<script>
const fields = ["patientName", "ageSex", "roomBedNo", "attendingPhysician", "caseNo", "laboratoryReports"];
syncPatientHeader();
const record = getActiveRecord();
fillFields(fields, record);

document.getElementById("savePage").addEventListener("click", function() {
  updateActiveRecord(collectFields(fields));
  alert("Laboratory Report saved.");
});
</script>

</body>
</html>
